/* ─── API ─── */
async function callClaude(prompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [{
        role: "user",
        content: `你是台股投資分析助手，請用繁體中文回答，搜尋最新數據後給出簡潔摘要（200字內），重點數字要標清楚。\n\n${prompt}`
      }],
    }),
  });
  if (!res.ok) throw new Error(`API錯誤 ${res.status}`);
  const data = await res.json();
  if (!data || !Array.isArray(data.content)) throw new Error("回傳格式異常");
  const blocks = data.content.filter(b => b && b.type === "text");
  if (!blocks.length) throw new Error("未收到文字回應，請稍後再試");
  return blocks.map(b => b.text).join("\n").trim();
}

/* ─── ENTRY SIGNAL PROMPT ─── */
function buildSignalQ(name, sym) {
  return `你是台股技術面＋籌碼面判讀助手。請針對「${name}（${sym}）」做一次進場燈號判斷：
1. 查詢目前股價，以及5日、20日、60日均線的相對位置，判斷是多頭排列、空頭排列還是糾結
2. 查詢最近三大法人（外資、投信、自營商）合計買賣超，是否有連續買超或賣超天數
3. 綜合兩者，給出一個燈號：
🟢 偏多可留意進場（均線多頭排列，且法人買盤支撐，或拉回未破關鍵均線）
🟡 觀望（訊號分歧、法人賣超未止穩，或無明顯支撐確認）
🔴 不建議進場（空頭排列，或法人持續大賣，或已跌破關鍵支撐）
請務必把「燈號：🟢」或「燈號：🟡」或「燈號：🔴」放在回答的最開頭（三選一，只選一個），接著在100字內用繁體中文說明理由。最後加一句：此為技術面與籌碼面框架分析，不構成投資建議。`;
}

/* ─── SIGNAL BUTTON ─── */
function SignalBtn({ name, sym }) {
  const [state, setState] = useState("idle"); // idle | loading | done | err
  const [result, setResult] = useState("");
  const [signal, setSignal] = useState(null); // green | yellow | red
  const [open, setOpen] = useState(false);

  const run = async (e) => {
    e.stopPropagation();
    if (state === "loading") return;
    setState("loading");
    setOpen(true);
    try {
      const ans = await callClaude(buildSignalQ(name, sym));
      setResult(ans);
      const s = ans.includes("🟢") ? "green" : ans.includes("🔴") ? "red" : "yellow";
      setSignal(s);
      setState("done");
    } catch (err) {
      setResult("❌ " + err.message);
      setSignal(null);
      setState("err");
    }
  };

  const sigStyle = {
    green: { borderColor: "rgba(0,232,122,.4)", color: "#00e87a", background: "rgba(0,232,122,.08)" },
    yellow: { borderColor: "rgba(250,204,21,.4)", color: "#facc15", background: "rgba(250,204,21,.08)" },
    red: { borderColor: "rgba(255,61,90,.4)", color: "#ff3d5a", background: "rgba(255,61,90,.08)" },
  }[signal] || {};

  const sigLabel = { green: "🟢 偏多可留意", yellow: "🟡 觀望", red: "🔴 不建議進場" }[signal];

  return (
    <div className="qwrap" onClick={e => e.stopPropagation()}>
      <button
        className={`sigbtn${state === "loading" ? " loading" : ""}`}
        style={sigStyle}
        onClick={run}
        disabled={state === "loading"}
      >
        {state === "loading" ? <><span className="spin-sm"/>判讀中...</> : signal ? sigLabel : "🚦 進場燈號判讀"}
      </button>
      {open && (state === "done" || state === "err") && (
        <div className="qresult">
          <button className="qclose" onClick={() => setOpen(false)}>✕</button>
          <div className="qtext">{result}</div>
        </div>
      )}
      {open && state === "loading" && (
        <div className="qresult loading-box">
          <span className="spinner"/><span>分析均線與法人籌碼中...</span>
        </div>
      )}
    </div>
  );
}

/* ─── QUERY BUTTON ─── */

  const run = async (e) => {
    e.stopPropagation();
    if (state === "loading") return;
    setState("loading");
    setOpen(true);
    try {
      const ans = await callClaude(question);
      setResult(ans);
      setState("done");
    } catch (err) {
      setResult("❌ " + err.message);
      setState("err");
    }
  };

  const label = state === "loading" ? "查詢中..." : state === "done" ? "🔄 重新查詢" : state === "err" ? "🔄 重試" : "🤖 查詢";

  return (
    <div className="qwrap" onClick={e => e.stopPropagation()}>
      <button className={`qbtn${small ? " sm" : ""}${state === "loading" ? " loading" : ""}`} onClick={run} disabled={state === "loading"}>
        {state === "loading" ? <><span className="spin-sm"/>查詢中</> : label}
      </button>
      {open && (state === "done" || state === "err") && (
        <div className="qresult">
          <button className="qclose" onClick={() => setOpen(false)}>✕</button>
          <div className="qtext">{result}</div>

      {open && state === "loading" && (
        <div className="qresult loading-box">
          <span className="spinner"/><span>搜尋最新數據中...</span>
        </div>

  );
}

/* ─── AI PAGE ─── */
function AiPage() {
  const [query, setQuery] = useState("");
  const [result, setResult] = useState("");
  const [loading, setLoading] = useState(false);

  const run = async (q) => {
    const text = typeof q === "string" ? q : query;
    if (!text.trim()) return;
    setLoading(true); setResult("");
    try { setResult(await callClaude(text)); }
    catch (e) { setResult("❌ " + e.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="page-inner">
      <div className="sec-title">🤖 AI 即時查詢</div>
      <div className="preset-grid">
        {AI_PRESETS.map((p, i) => (
          <button key={i} className="preset-btn" onClick={() => { setQuery(p.q); run(p.q); }}>{p.label}</button>
        ))}
      </div>
      <div className={`ai-box${query ? " focus" : ""}`}>
        <textarea
          className="ai-ta"
          placeholder="輸入問題…（Enter 送出）"
          value={query}
          onChange={e => setQuery(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); run(); } }}
        />
      </div>
      <button className="ai-submit" disabled={loading || !query.trim()} onClick={() => run()}>
        {loading ? "查詢中..." : "🔍 查詢最新數據"}
      </button>
      {(loading || result) && (
        <div className={`ai-result${loading ? " loading" : ""}`}>
          {loading ? <><div className="spinner"/><span>搜尋最新市場數據中...</span></> : result}
        </div>
      )}
      <div className="note">Claude AI + 即時網路搜尋 ✦ 數據僅供參考，不構成投資建議</div>
    </div>
  );
}

  const [page, setPage] = useState(0);
  const [checks, setChecks] = useState({});
  const [today, setToday] = useState("");

  useEffect(() => {
    const d = new Date();
    const wd = ["日","一","二","三","四","五","六"][d.getDay()];
    setToday(`${d.getMonth()+1}/${d.getDate()}（${wd}）`);
  }, []);

  const toggle = id => setChecks(p => ({ ...p, [id]: !p[id] }));
  const done = Object.values(checks).filter(Boolean).length;
  const pct = Math.round((done / CL_ITEMS.length) * 100);

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@500&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{
          --bg:#080d16;--bg2:#0d1525;--bg3:#111e33;
          --bd:#1a2840;--bd2:#243650;
          --ac:#00c8ff;--ac2:#ff6b35;--ac3:#00e87a;
          --red:#ff3d5a;--tx:#dde6f0;--tx2:#7a90aa;--tx3:#3d5270;
          --sb:200px;--tb:52px;--bb:62px;
        }
        html,body,#root{height:100%;background:var(--bg);}
        .app{font-family:'Noto Sans TC',sans-serif;color:var(--tx);min-height:100vh;background:var(--bg);
          background-image:radial-gradient(ellipse 60% 40% at 5% 0%,rgba(0,200,255,.07) 0%,transparent 70%),
            radial-gradient(ellipse 50% 40% at 95% 100%,rgba(255,107,53,.05) 0%,transparent 70%);}

        /* TOPBAR */
        .topbar{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--tb);
          background:rgba(8,13,22,.93);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd);
          display:flex;align-items:center;justify-content:space-between;padding:0 16px;}
        .tb-logo{font-size:17px;font-weight:900;letter-spacing:.04em;}
        .tb-logo span{color:var(--ac);}
        .tb-date{font-size:12px;color:var(--tx2);display:flex;align-items:center;gap:6px;}
        .live-dot{width:7px;height:7px;border-radius:50%;background:var(--ac3);
          box-shadow:0 0 6px var(--ac3);animation:blink 2s ease-in-out infinite;}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

        /* LAYOUT */
        .layout{display:flex;padding-top:var(--tb);min-height:100vh;}
        .sidebar{display:none;flex-direction:column;width:var(--sb);position:fixed;
          top:var(--tb);bottom:0;left:0;background:var(--bg2);border-right:1px solid var(--bd);
          padding:14px 10px;overflow-y:auto;z-index:100;}
        .nav{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;
          cursor:pointer;font-size:14px;font-weight:500;color:var(--tx2);transition:all .18s;margin-bottom:3px;}
        .nav:hover{background:var(--bg3);color:var(--tx);}
        .nav.on{background:rgba(0,200,255,.1);color:var(--ac);}
        .nav-icon{font-size:16px;}
        .main{flex:1;overflow-y:auto;padding-bottom:calc(var(--bb)+12px);}
        .page-inner{padding:16px;max-width:1200px;}
        .sec-title{font-size:14px;font-weight:700;color:var(--tx2);letter-spacing:.04em;margin-bottom:14px;padding-left:2px;}

        /* STOCK CARD */
        .sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
        .sc{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:12px 13px;transition:border-color .18s;}
        .sc:hover{border-color:var(--bd2);}
        .sc-head{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
        .sc-icon{font-size:20px;flex-shrink:0;}
        .sc-info{flex:1;min-width:0;}
        .sc-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .sc-cat{font-size:10px;color:var(--ac2);background:rgba(255,107,53,.1);
          display:inline-block;padding:1px 6px;border-radius:4px;margin-top:3px;}
        .sc-sym{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx3);flex-shrink:0;}
        .sc-btns{display:flex;gap:6px;}
        .tv-btn{flex:1;display:block;text-align:center;padding:6px 0;
          background:rgba(0,200,255,.07);border:1px solid rgba(0,200,255,.2);
          border-radius:7px;font-size:12px;color:var(--ac);text-decoration:none;transition:all .15s;white-space:nowrap;}
        .tv-btn:hover{background:rgba(0,200,255,.15);}
        .tv-btn.sm{padding:5px 0;font-size:11px;}

        /* QUERY BTN */
        .qwrap{flex:1;position:relative;}
        .qbtn{width:100%;padding:6px 4px;background:rgba(0,232,122,.07);
          border:1px solid rgba(0,232,122,.25);border-radius:7px;
          font-size:12px;color:var(--ac3);cursor:pointer;font-family:inherit;
          display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s;white-space:nowrap;}
        .qbtn:hover{background:rgba(0,232,122,.15);}
        .qbtn:disabled{opacity:.6;cursor:not-allowed;}
        .qbtn.sm{padding:5px 4px;font-size:11px;}
        .qbtn.loading{color:var(--tx3);border-color:var(--bd2);}
        .spin-sm{width:10px;height:10px;border:1.5px solid var(--bd2);border-top-color:var(--ac3);
          border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;}
        @keyframes spin{to{transform:rotate(360deg)}}
        .qresult{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:300;
          background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;
          padding:12px 13px;font-size:12px;color:var(--tx2);line-height:1.8;
          white-space:pre-wrap;box-shadow:0 8px 32px rgba(0,0,0,.5);
          max-height:260px;overflow-y:auto;}
        .qresult.loading-box{display:flex;align-items:center;gap:8px;color:var(--tx3);max-height:60px;}
        .qclose{position:absolute;top:8px;right:10px;background:none;border:none;
          color:var(--tx3);cursor:pointer;font-size:14px;padding:2px 6px;line-height:1;}
        .qclose:hover{color:var(--tx);}
        .qtext{padding-right:20px;}

        /* SIGNAL BTN */
        .sigbtn{width:100%;margin-top:6px;padding:7px 4px;background:rgba(122,144,170,.06);
          border:1px solid var(--bd2);border-radius:7px;font-size:11px;color:var(--tx2);
          cursor:pointer;font-family:inherit;font-weight:600;
          display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s;}
        .sigbtn:hover{background:rgba(122,144,170,.13);}
        .sigbtn:disabled{opacity:.6;cursor:not-allowed;}
        .sigbtn.loading{color:var(--tx3);}

        /* WATCHLIST TABS */
        .wtabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;}
        .wtab{flex-shrink:0;padding:7px 13px;border-radius:8px;border:1px solid var(--bd);
          background:var(--bg2);color:var(--tx2);font-size:12px;font-weight:600;
          cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;}
        .wtab:hover{border-color:var(--bd2);color:var(--tx);}
        .wtab.on{background:rgba(0,200,255,.12);border-color:var(--ac);color:var(--ac);}

        /* ETF */
        .egrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:20px;}
        .etf{background:var(--bg2);border:1px solid var(--bd);border-radius:11px;padding:11px 12px;}
        .etf-sym{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--ac);margin-bottom:3px;}
        .etf-name{font-size:11px;color:var(--tx2);line-height:1.4;margin-bottom:9px;min-height:28px;}

        /* CHECKLIST */
        .prog-wrap{background:var(--bg3);border-radius:8px;height:6px;margin-bottom:14px;overflow:hidden;}
        .prog-bar{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac3));border-radius:8px;transition:width .3s;}
        .prog-label{font-size:12px;color:var(--tx2);margin-bottom:8px;display:flex;justify-content:space-between;}
        .cl-group{font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--tx3);margin:14px 0 8px 2px;}
        .cr{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;
          padding:10px 12px;margin-bottom:7px;transition:all .15s;}
        .cr:hover{border-color:var(--bd2);}
        .cr.done{border-color:rgba(0,232,122,.25);background:rgba(0,232,122,.04);}
        .cr-main{display:flex;align-items:center;gap:11px;cursor:pointer;margin-bottom:8px;}
        .cr-box{width:22px;height:22px;border-radius:6px;flex-shrink:0;border:1.5px solid var(--bd2);
          display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ac3);transition:all .15s;}
        .cr.done .cr-box{background:rgba(0,232,122,.15);border-color:var(--ac3);}
        .cr-body{flex:1;}
        .cr-label{font-size:13px;font-weight:500;}
        .cr.done .cr-label{color:var(--tx2);text-decoration:line-through;}
        .cr-hint{font-size:11px;color:var(--tx3);margin-top:2px;}
        .cr-time{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,.04);flex-shrink:0;}
        .reset-btn{width:100%;padding:11px;background:transparent;border:1px solid var(--bd);
          border-radius:10px;color:var(--tx3);font-size:13px;cursor:pointer;
          font-family:inherit;margin-top:12px;transition:all .15s;}
        .reset-btn:hover{border-color:var(--red);color:var(--red);}

        /* AI PAGE */
        .preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
        .preset-btn{background:var(--bg2);border:1px solid var(--bd);border-radius:9px;
          padding:10px 11px;font-size:12px;color:var(--tx2);cursor:pointer;
          font-family:inherit;text-align:left;line-height:1.4;transition:all .15s;font-weight:500;}
        .preset-btn:hover{border-color:var(--ac);color:var(--ac);}
        .ai-box{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;
          padding:12px 14px;margin-bottom:10px;transition:border-color .15s;}
        .ai-box.focus,.ai-box:focus-within{border-color:var(--ac);}
        .ai-ta{width:100%;background:transparent;border:none;outline:none;color:var(--tx);
          font-size:14px;font-family:inherit;resize:none;min-height:60px;line-height:1.6;}
        .ai-ta::placeholder{color:var(--tx3);}
        .ai-submit{width:100%;padding:13px;
          background:linear-gradient(135deg,rgba(0,200,255,.15),rgba(0,200,255,.08));
          border:1px solid rgba(0,200,255,.35);border-radius:11px;
          color:var(--ac);font-size:14px;font-weight:700;cursor:pointer;
          font-family:inherit;transition:all .18s;margin-bottom:14px;}
        .ai-submit:hover{background:rgba(0,200,255,.22);}
        .ai-submit:disabled{opacity:.5;cursor:not-allowed;}
        .ai-result{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;
          padding:14px;font-size:13px;line-height:1.9;color:var(--tx2);white-space:pre-wrap;min-height:80px;}
        .ai-result.loading{display:flex;align-items:center;justify-content:center;color:var(--tx3);gap:8px;}
        .spinner{width:18px;height:18px;border:2px solid var(--bd2);border-top-color:var(--ac);
          border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}

        /* BOTTOM TABS */
        .bottom-tabs{position:fixed;bottom:0;left:0;right:0;z-index:200;height:var(--bb);
          background:rgba(8,13,22,.95);backdrop-filter:blur(14px);border-top:1px solid var(--bd);display:flex;}
        .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
          gap:3px;cursor:pointer;color:var(--tx3);font-size:10px;background:none;border:none;
          font-family:inherit;transition:color .15s;}
        .tab.on{color:var(--ac);}
        .tab-icon{font-size:20px;}
        .note{font-size:10px;color:var(--tx3);text-align:center;line-height:1.9;padding:16px 0 4px;}

        /* RESPONSIVE */
        @media(min-width:640px){
          .sgrid{grid-template-columns:repeat(3,1fr);}
          .egrid{grid-template-columns:repeat(3,1fr);}
          .preset-grid{grid-template-columns:repeat(3,1fr);}
          .page-inner{padding:20px;}
        }
        @media(min-width:900px){
          .sidebar{display:flex;}
          .bottom-tabs{display:none;}
          .main{margin-left:var(--sb);padding-bottom:24px;}
          .page-inner{padding:24px 28px;}
          .sgrid{grid-template-columns:repeat(4,1fr);gap:12px;}
          .egrid{grid-template-columns:repeat(4,1fr);gap:11px;}
          .preset-grid{grid-template-columns:repeat(3,1fr);}
        }
        @media(min-width:1300px){
          .sgrid{grid-template-columns:repeat(5,1fr);}
          .egrid{grid-template-columns:repeat(5,1fr);}
        }
      `}</style>

      <div className="app">
        <div className="topbar">
          <div className="tb-logo">台股<span>AI</span>追蹤系統</div>
          <div className="tb-date"><div className="live-dot"/>{today}</div>
        </div>

        <div className="layout">
          <div className="sidebar">
            {PAGES.map(p => (
              <div key={p.id} className={`nav${page===p.id?" on":""}`} onClick={()=>setPage(p.id)}>
                <span className="nav-icon">{p.icon}</span>{p.label}
              </div>
            ))}
          </div>

          <div className="main">

            {page===0 && (
              <div className="page-inner">
                <div className="sec-title">🇺🇸 美股關鍵指標</div>
                <div className="sgrid">{US_STOCKS.map(s=><StockCard key={s.sym} {...s}/>)}</div>
                <div className="note">TradingView 圖表 ✦ 🤖 按鈕查詢即時數據 ✦ 投資有風險，僅供參考</div>
              </div>
            )}

            {page===1 && <WatchPage/>}

            {page===2 && (
              <div className="page-inner">
                <div className="sec-title">✅ 每日追蹤清單</div>
                <div className="prog-label">
                  <span>今日進度</span>
                  <span style={{color:done===CL_ITEMS.length?"var(--ac3)":"var(--tx2)"}}>{done}/{CL_ITEMS.length}（{pct}%）</span>
                </div>
                <div className="prog-wrap"><div className="prog-bar" style={{width:`${pct}%`}}/></div>
                {["pre","intra","post"].map(t=>{
                  const lab={pre:"☀️ 盤前（開盤前）",intra:"📈 盤中（可選）",post:"🌙 盤後（5分鐘）"}[t];
                  return (
                    <div key={t}>
                      <div className="cl-group">{lab}</div>
                      {CL_ITEMS.filter(i=>i.time===t).map(item=>(
                        <CheckRow key={item.id} item={item} done={!!checks[item.id]} onToggle={toggle}/>
                      ))}
                    </div>
                  );
                })}
                <button className="reset-btn" onClick={()=>setChecks({})}>🔄 重置今日清單</button>
                <div className="note">每日盤前5分鐘、盤後5分鐘完成核心項目 ✦ 看懂趨勢是技術，控制部位是紀律</div>
              </div>
            )}

            {page===3 && <AiPage/>}

          </div>
        </div>

        <div className="bottom-tabs">
          {PAGES.map(p=>(
            <button key={p.id} className={`tab${page===p.id?" on":""}`} onClick={()=>setPage(p.id)}>
              <span className="tab-icon">{p.icon}</span>{p.label}
            </button>
          ))}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
